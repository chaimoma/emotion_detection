name: Python CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

#What jobs to run
jobs:
  test:
    
    runs-on: ubuntu-latest

    #steps to run
    steps:
      # check out code
      - name: Check out repository
        uses: actions/checkout@v4

      # set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
      
      # Install all libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Run  test
      - name: Run Pytest
        run: |
          python -m pytest